schema: spec-driven

context: |
  ## 프로젝트 개요
  EAI(Enterprise Application Integration) 서비스에서 오류 발생 시 email alert를 보내기 전에,
  외부 ChatGPT API를 통해 Java error stacktrace 메시지를 정제(refinement)하여 반환하는 중간 처리 서비스.

  ## 기술 스택
  - Language: Python 3 (latest stable version)
  - Framework: FastAPI (RESTful API server)
  - External API: ChatGPT REST API (Bearer token authentication, mock service for testing)
  - Similarity DB: 텍스트 유사도 비교를 위한 인메모리 또는 파일 기반 저장소
  - Text Similarity Algorithm: TF-IDF + Cosine Similarity (scikit-learn) 또는 difflib.SequenceMatcher

  ## 서비스 플로우 (Service Flow)
  1. RESTful API로 interface_id 와 Java error stacktrace 정보를 JSON 형태로 수신
  2. 수신된 interface_id 와 error 문자열을 외부 ChatGPT REST API로 정의된 system prompt와 함께 송신
     - ChatGPT API는 테스트를 위해 Mock Service로 구현하며 Bearer token 인증 방식 사용
  3. ChatGPT 결과를 response 전에 similarity DB에 저장 (key: interface_id, value: error stacktrace + chatgpt result)
     후 ChatGPT 결과 정보를 response
  4. 새로운 error 문자열 수신 시, ChatGPT API 호출 전에 interface_id 기준으로 similarity DB에서
     수신된 Java error stacktrace와 저장된 텍스트를 비교하여 유사도가 높은 경우 기존 결과 반환
     - 유사도 임계값(threshold) 및 알고리즘은 설정 가능하도록 구성
  5. ChatGPT API 호출 오류 또는 response timeout(30초) 발생 시, 수신된 원본 error stacktrace를 그대로 response

  ## 코드 작성 규칙
  - 모든 method 주석(docstring)은 한글로 작성
  - 기술적 내용(변수명, 타입 힌트, 로직 설명 inline comment)은 영문으로 작성
  - 테스트 코드 작성 필수 (pytest 기반)
  - 사용 라이브러리는 requirements.txt에 명시

  

  ## 디렉토리 구조 (권장)
  ```
  taurus-chatgpt-agent/
  ├── app/
  │   ├── main.py              # FastAPI app entry point
  │   ├── api/
  │   │   └── routes.py        # API route definitions
  │   ├── services/
  │   │   ├── chatgpt_service.py   # ChatGPT API client (with mock)
  │   │   └── similarity_service.py # Text similarity & DB logic
  │   ├── models/
  │   │   └── schemas.py       # Pydantic request/response models
  │   └── config.py            # App configuration (timeout, threshold, etc.)
  ├── tests/
  │   ├── test_api.py
  │   ├── test_chatgpt_service.py
  │   └── test_similarity_service.py
  └── requirements.txt
  ```

rules:
  proposal:
    - 서비스 플로우의 각 단계를 명확히 반영한 설계를 제안할 것
    - Mock ChatGPT API와 실제 ChatGPT API를 쉽게 전환할 수 있는 구조로 설계
    - 유사도 알고리즘은 교체 가능하도록 인터페이스 기반으로 설계
    - timeout 및 유사도 임계값은 환경 변수 또는 설정 파일로 관리
  tasks:
    - 각 태스크는 단일 기능 단위로 분리 (API 수신, ChatGPT 연동, Similarity DB, 테스트 등)
    - 테스트 코드 작성 태스크를 반드시 포함
    - requirements.txt 생성 태스크를 포함
  design:
    - Pydantic schema (request/response models) 정의 포함
    - HTTPException error code 및 메시지 포함
  specs:
    - Given/When/Then (Gherkin) 형식으로 작성ㅋ
